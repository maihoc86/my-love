<!DOCTYPE html>
<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding Welcome - MyLoveThaiHoc</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#f43e5c',
            background: '#f8f5f6',
          },
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
          },
        }
      }
    }
  </script>
<style>
    body { background-color: #f8f5f6; }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    @keyframes pulse-heart {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.15); opacity: 1; }
    }
    .float-anim { animation: float 3s ease-in-out infinite; }
    .heart-pulse { animation: pulse-heart 2s ease-in-out infinite; }
  </style>
</head>
<body class="antialiased font-sans">
<div class="min-h-screen flex flex-col max-w-md mx-auto relative">
  <!-- Hero Section -->
  <div class="relative h-[58vh] bg-gradient-to-br from-rose-500 to-purple-600 flex flex-col items-center justify-center overflow-hidden">
    <!-- Decorative circles -->
    <div class="absolute -top-10 -right-10 w-40 h-40 bg-white/10 rounded-full"></div>
    <div class="absolute top-32 -left-8 w-24 h-24 bg-white/5 rounded-full"></div>
    <div class="absolute bottom-20 right-8 w-16 h-16 bg-white/8 rounded-full"></div>
    <!-- Floating hearts -->
    <div class="absolute top-20 left-12 text-white/20 text-2xl heart-pulse" style="animation-delay: 0s;">♥</div>
    <div class="absolute top-40 right-16 text-white/15 text-lg heart-pulse" style="animation-delay: 0.5s;">♥</div>
    <div class="absolute bottom-32 left-20 text-white/10 text-xl heart-pulse" style="animation-delay: 1s;">♥</div>
    <!-- Logo -->
    <div class="float-anim">
      <div class="w-24 h-24 bg-white/20 rounded-3xl flex items-center justify-center backdrop-blur-md mb-6 shadow-lg shadow-black/10">
        <span class="material-symbols-outlined text-white" style="font-size: 56px; font-variation-settings: 'FILL' 1;">favorite</span>
      </div>
    </div>
    <h1 class="text-white text-3xl font-extrabold tracking-tight">MyLoveThaiHoc</h1>
    <p class="text-white/70 text-sm mt-1">Ghi nhớ mọi điều về em</p>
  </div>

  <!-- Content Card -->
  <main class="flex-grow bg-white rounded-t-[32px] -mt-6 relative z-10 px-6 pt-8 pb-8 shadow-xl flex flex-col">
    <div class="text-center mb-6">
      <h2 class="text-2xl font-bold text-slate-900">Chào mừng bạn! 💕</h2>
      <p class="text-sm text-slate-500 mt-2 leading-relaxed">MyLoveThaiHoc giúp bạn ghi nhận và trân trọng mọi khoảnh khắc bên người bạn yêu thương</p>
    </div>

    <!-- Feature pills -->
    <div class="flex justify-center gap-2 mb-8">
      <div class="flex items-center gap-1.5 bg-rose-50 text-rose-600 px-3 py-1.5 rounded-full text-xs font-semibold">
        <span>📝</span> Ghi chú tình yêu
      </div>
      <div class="flex items-center gap-1.5 bg-purple-50 text-purple-600 px-3 py-1.5 rounded-full text-xs font-semibold">
        <span>💬</span> AI Chat
      </div>
      <div class="flex items-center gap-1.5 bg-pink-50 text-pink-600 px-3 py-1.5 rounded-full text-xs font-semibold">
        <span>📅</span> Lịch kỷ niệm
      </div>
    </div>

    <div class="mt-auto">
      <!-- CTA Button -->
      <button class="w-full py-4 bg-gradient-to-r from-primary to-pink-500 text-white font-bold rounded-2xl shadow-lg shadow-rose-200 active:scale-[0.98] transition-all text-base">
        Bắt đầu thiết lập
      </button>
      <p class="text-xs text-slate-400 text-center mt-3">Chỉ mất 2 phút để hoàn tất</p>

      <!-- Progress dots -->
      <div class="flex justify-center gap-2 mt-6">
        <div class="w-8 h-2 bg-primary rounded-full"></div>
        <div class="w-2 h-2 bg-slate-200 rounded-full"></div>
        <div class="w-2 h-2 bg-slate-200 rounded-full"></div>
        <div class="w-2 h-2 bg-slate-200 rounded-full"></div>
        <div class="w-2 h-2 bg-slate-200 rounded-full"></div>
      </div>
    </div>
  </main>
</div>
</body></html>
