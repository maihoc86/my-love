<!DOCTYPE html>
<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding - Ngày yêu nhau - MyLoveThaiHoc</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#f43e5c',
            background: '#f8f5f6',
          },
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
          },
        }
      }
    }
  </script>
<style>
    body { background-color: #f8f5f6; }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .cal-day {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 9999px; font-size: 14px; cursor: pointer;
      transition: all 0.15s;
    }
    .cal-day:hover { background-color: #f1f5f9; }
    .cal-day.selected { background: linear-gradient(135deg, #f43e5c, #ec4899); color: white; font-weight: 700; }
    .cal-day.today { box-shadow: inset 0 0 0 2px rgba(244,62,92,0.3); }
    .cal-day.other-month { color: #cbd5e1; }
  </style>
</head>
<body class="antialiased font-sans">
<div class="min-h-screen flex flex-col max-w-md mx-auto relative">
  <!-- Header -->
  <header class="relative h-[25vh] bg-gradient-to-br from-rose-500 to-purple-600 flex flex-col justify-center px-6 overflow-hidden">
    <div class="absolute -top-10 -right-10 w-32 h-32 bg-white/10 rounded-full"></div>
    <div class="absolute top-20 -left-5 w-20 h-20 bg-white/5 rounded-full"></div>
    <div class="absolute top-6 left-6">
      <button class="bg-white/20 backdrop-blur-sm p-2 rounded-full text-white flex items-center justify-center">
        <span class="material-symbols-outlined">arrow_back</span>
      </button>
    </div>
    <div class="flex flex-col items-center mt-4">
      <div class="w-14 h-14 bg-white/20 rounded-2xl flex items-center justify-center backdrop-blur-md mb-3">
        <span class="material-symbols-outlined text-white" style="font-size: 32px; font-variation-settings: 'FILL' 1;">event_heart</span>
      </div>
      <h1 class="text-white text-2xl font-bold">Ngày đặc biệt 💝</h1>
    </div>
  </header>

  <!-- Form Card -->
  <main class="flex-grow bg-white rounded-t-[32px] -mt-6 relative z-10 px-6 pt-8 pb-8 shadow-xl flex flex-col">
    <div class="mb-5">
      <h2 class="text-xl font-bold text-slate-900">Ngày yêu nhau</h2>
      <p class="text-sm text-slate-500 mt-1">Ngày hai bạn chính thức bên nhau</p>
    </div>

    <!-- Mini Calendar -->
    <div class="bg-slate-50 rounded-2xl p-4 border border-slate-100">
      <!-- Calendar Header -->
      <div class="flex items-center justify-between mb-4">
        <button class="p-1.5 rounded-full hover:bg-slate-200 transition">
          <span class="material-symbols-outlined text-slate-600" style="font-size: 20px;">chevron_left</span>
        </button>
        <h3 class="font-bold text-slate-800">Tháng 3, 2025</h3>
        <button class="p-1.5 rounded-full hover:bg-slate-200 transition">
          <span class="material-symbols-outlined text-slate-600" style="font-size: 20px;">chevron_right</span>
        </button>
      </div>
      <!-- Day headers -->
      <div class="grid grid-cols-7 mb-1">
        <div class="cal-day text-xs font-semibold text-slate-400 cursor-default hover:bg-transparent">T2</div>
        <div class="cal-day text-xs font-semibold text-slate-400 cursor-default hover:bg-transparent">T3</div>
        <div class="cal-day text-xs font-semibold text-slate-400 cursor-default hover:bg-transparent">T4</div>
        <div class="cal-day text-xs font-semibold text-slate-400 cursor-default hover:bg-transparent">T5</div>
        <div class="cal-day text-xs font-semibold text-slate-400 cursor-default hover:bg-transparent">T6</div>
        <div class="cal-day text-xs font-semibold text-slate-400 cursor-default hover:bg-transparent">T7</div>
        <div class="cal-day text-xs font-semibold text-slate-400 cursor-default hover:bg-transparent">CN</div>
      </div>
      <!-- Calendar grid -->
      <div class="grid grid-cols-7">
        <div class="cal-day other-month">24</div>
        <div class="cal-day other-month">25</div>
        <div class="cal-day other-month">26</div>
        <div class="cal-day other-month">27</div>
        <div class="cal-day other-month">28</div>
        <div class="cal-day">1</div>
        <div class="cal-day">2</div>
        <div class="cal-day">3</div>
        <div class="cal-day">4</div>
        <div class="cal-day">5</div>
        <div class="cal-day">6</div>
        <div class="cal-day">7</div>
        <div class="cal-day">8</div>
        <div class="cal-day">9</div>
        <div class="cal-day">10</div>
        <div class="cal-day">11</div>
        <div class="cal-day">12</div>
        <div class="cal-day">13</div>
        <div class="cal-day selected">14</div>
        <div class="cal-day today">15</div>
        <div class="cal-day">16</div>
        <div class="cal-day">17</div>
        <div class="cal-day">18</div>
        <div class="cal-day">19</div>
        <div class="cal-day">20</div>
        <div class="cal-day">21</div>
        <div class="cal-day">22</div>
        <div class="cal-day">23</div>
        <div class="cal-day">24</div>
        <div class="cal-day">25</div>
        <div class="cal-day">26</div>
        <div class="cal-day">27</div>
        <div class="cal-day">28</div>
        <div class="cal-day">29</div>
        <div class="cal-day">30</div>
        <div class="cal-day">31</div>
      </div>
    </div>

    <!-- Love Counter Preview -->
    <div class="bg-gradient-to-r from-rose-50 to-purple-50 border border-rose-100 rounded-2xl p-5 mt-5 text-center">
      <p class="text-3xl font-extrabold text-primary">365 ngày</p>
      <p class="text-sm text-slate-500 mt-1">bên nhau 💕</p>
      <div class="flex justify-center gap-3 mt-3">
        <span class="text-xs text-slate-400 bg-white/80 px-2.5 py-1 rounded-full">1 năm</span>
        <span class="text-xs text-slate-400 bg-white/80 px-2.5 py-1 rounded-full">0 tháng</span>
        <span class="text-xs text-slate-400 bg-white/80 px-2.5 py-1 rounded-full">0 ngày</span>
      </div>
    </div>

    <div class="mt-auto pt-5">
      <button class="w-full py-4 bg-gradient-to-r from-primary to-pink-500 text-white font-bold rounded-2xl shadow-lg shadow-rose-200 active:scale-[0.98] transition-all">
        Tiếp tục
      </button>
      <button class="w-full py-2 text-sm text-slate-400 font-medium mt-2">Bỏ qua</button>

      <!-- Progress dots -->
      <div class="flex justify-center gap-2 mt-4">
        <div class="w-2 h-2 bg-primary rounded-full"></div>
        <div class="w-2 h-2 bg-primary rounded-full"></div>
        <div class="w-2 h-2 bg-primary rounded-full"></div>
        <div class="w-8 h-2 bg-primary rounded-full"></div>
        <div class="w-2 h-2 bg-slate-200 rounded-full"></div>
      </div>
    </div>
  </main>
</div>
</body></html>
