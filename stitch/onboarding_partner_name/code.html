<!DOCTYPE html>
<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding - Tên người yêu - MyLoveThaiHoc</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#f43e5c',
            background: '#f8f5f6',
          },
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
          },
        }
      }
    }
  </script>
<style>
    body { background-color: #f8f5f6; }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .input-focus:focus {
      border-color: #f43e5c;
      box-shadow: 0 0 0 2px rgba(244, 62, 92, 0.2);
    }
  </style>
</head>
<body class="antialiased font-sans">
<div class="min-h-screen flex flex-col max-w-md mx-auto relative">
  <!-- Header -->
  <header class="relative h-[25vh] bg-gradient-to-br from-rose-500 to-purple-600 flex flex-col justify-center px-6 overflow-hidden">
    <div class="absolute -top-10 -right-10 w-32 h-32 bg-white/10 rounded-full"></div>
    <div class="absolute top-20 -left-5 w-20 h-20 bg-white/5 rounded-full"></div>
    <!-- Back Button -->
    <div class="absolute top-6 left-6">
      <button class="bg-white/20 backdrop-blur-sm p-2 rounded-full text-white flex items-center justify-center">
        <span class="material-symbols-outlined">arrow_back</span>
      </button>
    </div>
    <div class="flex flex-col items-center mt-4">
      <div class="w-14 h-14 bg-white/20 rounded-2xl flex items-center justify-center backdrop-blur-md mb-3">
        <span class="material-symbols-outlined text-white" style="font-size: 32px;">person_heart</span>
      </div>
      <h1 class="text-white text-2xl font-bold">Người ấy là ai?</h1>
    </div>
  </header>

  <!-- Form Card -->
  <main class="flex-grow bg-white rounded-t-[32px] -mt-6 relative z-10 px-6 pt-8 pb-8 shadow-xl flex flex-col">
    <div class="mb-6">
      <h2 class="text-xl font-bold text-slate-900">Thông tin người yêu</h2>
      <p class="text-sm text-slate-500 mt-1">Cho mình biết tên người yêu của bạn nhé</p>
    </div>

    <form class="space-y-5 flex-grow">
      <!-- Partner Name -->
      <div class="space-y-1.5">
        <label class="text-sm font-semibold text-slate-700 ml-1">Tên người yêu <span class="text-primary">*</span></label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">person</span>
          <input class="w-full pl-10 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none input-focus text-slate-900 transition-all" placeholder="Ví dụ: Thái Hoc" type="text" value="Thái Hoc"/>
        </div>
      </div>

      <!-- Nickname -->
      <div class="space-y-1.5">
        <div class="flex items-center gap-2 ml-1">
          <label class="text-sm font-semibold text-slate-700">Biệt danh / Tên gọi thân mật</label>
          <span class="text-[10px] bg-slate-100 text-slate-400 px-2 py-0.5 rounded-full font-medium">Không bắt buộc</span>
        </div>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" style="font-variation-settings: 'FILL' 1;">favorite</span>
          <input class="w-full pl-10 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none input-focus text-slate-900 transition-all" placeholder="Ví dụ: Bé Hoc, Honey..." type="text" value="Bé Hoc"/>
        </div>
      </div>

      <!-- Hint -->
      <div class="flex items-center gap-1.5 mt-2">
        <span class="material-symbols-outlined text-slate-300" style="font-size: 16px;">lightbulb</span>
        <p class="text-xs text-slate-400">Biệt danh sẽ hiển thị trên trang chủ</p>
      </div>
    </form>

    <div class="mt-auto pt-6">
      <!-- CTA -->
      <button class="w-full py-4 bg-gradient-to-r from-primary to-pink-500 text-white font-bold rounded-2xl shadow-lg shadow-rose-200 active:scale-[0.98] transition-all">
        Tiếp tục
      </button>

      <!-- Progress dots -->
      <div class="flex justify-center gap-2 mt-6">
        <div class="w-2 h-2 bg-primary rounded-full"></div>
        <div class="w-8 h-2 bg-primary rounded-full"></div>
        <div class="w-2 h-2 bg-slate-200 rounded-full"></div>
        <div class="w-2 h-2 bg-slate-200 rounded-full"></div>
        <div class="w-2 h-2 bg-slate-200 rounded-full"></div>
      </div>
    </div>
  </main>
</div>
</body></html>
