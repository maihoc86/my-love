<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ghi âm - MyLoveThaiHoc</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f43e5c",
                        "secondary": "#8b5cf6",
                        "background-light": "#fdf8f9",
                        "background-dark": "#221013",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex h-screen w-full flex-col bg-gradient-to-b from-white to-primary/5 dark:from-background-dark dark:to-primary/10 overflow-hidden">
<!-- Top App Bar -->
<div class="flex items-center p-4 justify-between">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-center cursor-pointer">
<span class="material-symbols-outlined text-2xl">close</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12">MyLoveThaiHoc</h2>
</div>
<!-- Content Area -->
<div class="flex flex-col items-center justify-center flex-1 px-6 text-center">
<div class="mb-2">
<span class="text-primary font-bold text-sm uppercase tracking-widest bg-primary/10 px-4 py-1 rounded-full">Đang lắng nghe...</span>
</div>
<p class="text-slate-500 dark:text-slate-400 text-base font-medium mb-12">AI sẽ tự động chuyển thành văn bản</p>
<!-- Visualizer / Wave Area -->
<div class="relative flex items-center justify-center mb-12">
<!-- Outer Pulse Rings -->
<div class="absolute w-64 h-64 bg-primary/10 rounded-full scale-110"></div>
<div class="absolute w-48 h-48 bg-primary/20 rounded-full scale-105"></div>
<!-- Central Mic Icon -->
<div class="relative z-10 w-32 h-32 bg-gradient-to-br from-primary to-secondary rounded-full flex items-center justify-center shadow-xl shadow-primary/30">
<span class="material-symbols-outlined text-white text-5xl">mic</span>
</div>
<!-- Animated Wave Representation (CSS Flexbox heights) -->
<div class="absolute bottom-[-60px] flex items-end gap-1.5 h-16">
<div class="w-1.5 bg-primary rounded-full h-4 opacity-40"></div>
<div class="w-1.5 bg-primary rounded-full h-8 opacity-60"></div>
<div class="w-1.5 bg-primary rounded-full h-12 opacity-80"></div>
<div class="w-1.5 bg-primary rounded-full h-16 opacity-100"></div>
<div class="w-1.5 bg-primary rounded-full h-10 opacity-80"></div>
<div class="w-1.5 bg-primary rounded-full h-14 opacity-60"></div>
<div class="w-1.5 bg-primary rounded-full h-6 opacity-40"></div>
</div>
</div>
<!-- Timer -->
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-5xl font-bold leading-tight mb-20">00:03</h1>
<!-- Action Buttons -->
<div class="w-full max-w-sm flex flex-col gap-4">
<button class="w-full py-4 px-6 bg-gradient-to-r from-primary to-secondary text-white font-bold rounded-xl shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
<span class="material-symbols-outlined">send</span>
                    Dừng &amp; Gửi
                </button>
<button class="w-full py-4 px-6 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 font-bold rounded-xl transition-colors hover:bg-slate-200">
                    Hủy
                </button>
</div>
</div>
<!-- Decorative elements -->
<div class="absolute top-20 right-[-50px] w-40 h-40 bg-secondary/5 rounded-full blur-3xl"></div>
<div class="absolute bottom-20 left-[-50px] w-40 h-40 bg-primary/5 rounded-full blur-3xl"></div>
</div>
</body></html>
