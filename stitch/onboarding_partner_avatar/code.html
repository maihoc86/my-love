<!DOCTYPE html>
<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding - Ảnh đại diện - MyLoveThaiHoc</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#f43e5c',
            background: '#f8f5f6',
          },
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
          },
        }
      }
    }
  </script>
<style>
    body { background-color: #f8f5f6; }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 1; transform: scale(1); }
    }
    .sparkle { animation: sparkle 2s ease-in-out infinite; }
  </style>
</head>
<body class="antialiased font-sans">
<div class="min-h-screen flex flex-col max-w-md mx-auto relative">
  <!-- Header -->
  <header class="relative h-[25vh] bg-gradient-to-br from-rose-500 to-purple-600 flex flex-col justify-center px-6 overflow-hidden">
    <div class="absolute -top-10 -right-10 w-32 h-32 bg-white/10 rounded-full"></div>
    <div class="absolute top-20 -left-5 w-20 h-20 bg-white/5 rounded-full"></div>
    <div class="absolute top-6 left-6">
      <button class="bg-white/20 backdrop-blur-sm p-2 rounded-full text-white flex items-center justify-center">
        <span class="material-symbols-outlined">arrow_back</span>
      </button>
    </div>
    <div class="flex flex-col items-center mt-4">
      <div class="w-14 h-14 bg-white/20 rounded-2xl flex items-center justify-center backdrop-blur-md mb-3">
        <span class="material-symbols-outlined text-white" style="font-size: 32px;">photo_camera</span>
      </div>
      <h1 class="text-white text-2xl font-bold">Thêm ảnh người ấy</h1>
    </div>
  </header>

  <!-- Form Card -->
  <main class="flex-grow bg-white rounded-t-[32px] -mt-6 relative z-10 px-6 pt-8 pb-8 shadow-xl flex flex-col">
    <div class="mb-6 text-center">
      <h2 class="text-xl font-bold text-slate-900">Ảnh đại diện</h2>
      <p class="text-sm text-slate-500 mt-1">Để trang chủ thêm sinh động nhé 📸</p>
    </div>

    <!-- Avatar Upload -->
    <div class="flex flex-col items-center">
      <div class="relative">
        <!-- Sparkles -->
        <div class="absolute -top-2 -right-2 text-yellow-400 sparkle" style="animation-delay: 0s;">✨</div>
        <div class="absolute -bottom-1 -left-3 text-yellow-400 sparkle" style="animation-delay: 0.7s;">✨</div>
        <div class="absolute top-4 -left-4 text-pink-300 sparkle" style="animation-delay: 1.4s;">💕</div>

        <!-- Avatar circle -->
        <div class="w-36 h-36 rounded-full border-4 border-dashed border-rose-200 bg-rose-50 flex items-center justify-center">
          <span class="material-symbols-outlined text-primary/50" style="font-size: 48px;">add_a_photo</span>
        </div>
        <!-- Camera button -->
        <button class="absolute bottom-1 right-1 w-10 h-10 bg-primary rounded-full shadow-lg shadow-rose-200 flex items-center justify-center">
          <span class="material-symbols-outlined text-white" style="font-size: 20px;">camera_alt</span>
        </button>
      </div>

      <!-- Partner name -->
      <h3 class="text-lg font-bold text-slate-900 mt-5">Thái Hoc</h3>
      <p class="text-sm text-slate-400">Bé Hoc 💕</p>
    </div>

    <!-- Upload buttons -->
    <div class="flex gap-3 mt-8">
      <button class="flex-1 flex items-center justify-center gap-2 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-700 font-semibold text-sm hover:bg-slate-100 transition">
        <span class="material-symbols-outlined text-slate-500" style="font-size: 20px;">photo_camera</span>
        Chụp ảnh
      </button>
      <button class="flex-1 flex items-center justify-center gap-2 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-700 font-semibold text-sm hover:bg-slate-100 transition">
        <span class="material-symbols-outlined text-slate-500" style="font-size: 20px;">photo_library</span>
        Thư viện
      </button>
    </div>

    <div class="mt-auto pt-6">
      <!-- CTA -->
      <button class="w-full py-4 bg-gradient-to-r from-primary to-pink-500 text-white font-bold rounded-2xl shadow-lg shadow-rose-200 active:scale-[0.98] transition-all relative overflow-hidden">
        <span class="relative z-10">Hoàn tất 🎉</span>
      </button>
      <button class="w-full py-2 text-sm text-slate-400 font-medium mt-2">Bỏ qua, để sau</button>

      <!-- Progress dots -->
      <div class="flex justify-center gap-2 mt-4">
        <div class="w-2 h-2 bg-primary rounded-full"></div>
        <div class="w-2 h-2 bg-primary rounded-full"></div>
        <div class="w-2 h-2 bg-primary rounded-full"></div>
        <div class="w-2 h-2 bg-primary rounded-full"></div>
        <div class="w-8 h-2 bg-primary rounded-full"></div>
      </div>
    </div>
  </main>
</div>
</body></html>
