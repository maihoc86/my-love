<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MyLoveThaiHoc - Dẫn đường</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#f43e5c', // Rose-500
            'app-bg': '#f8f5f6',
            'nav-blue': '#3b82f6',
          },
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'sans-serif'],
          },
        }
      }
    }
  </script>
<style data-purpose="custom-layout">
    body {
      background-color: #f8f5f6;
      height: 100vh;
      overflow: hidden;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    /* Simulation of a map background */
    .map-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #e5e7eb;
      background-image: 
        linear-gradient(#d1d5db 1px, transparent 1px),
        linear-gradient(90deg, #d1d5db 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
    }

    /* Simple CSS route line simulation */
    .route-line {
      position: absolute;
      top: 50%;
      left: 20%;
      width: 60%;
      height: 6px;
      background-color: #3b82f6;
      border-radius: 10px;
      transform: rotate(-15deg);
      box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
    }

    /* User Dot Pulse Effect */
    .user-dot {
      width: 16px;
      height: 16px;
      background: #3b82f6;
      border: 3px solid white;
      border-radius: 50%;
      position: absolute;
      top: 55%;
      left: 20%;
      box-shadow: 0 0 0 8px rgba(59, 130, 246, 0.2);
    }

    /* Destination Flag */
    .dest-flag {
      position: absolute;
      top: 40%;
      left: 78%;
      color: #ef4444;
    }

    .glass-effect {
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .btn-gradient {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
    }
  </style>
</head>
<body class="antialiased">
<!-- BEGIN: MapBackground -->
<main class="map-container" data-purpose="map-visualization">
<!-- Visual Route Simulation -->
<div class="route-line" data-purpose="simulated-route"></div>
<div class="user-dot" data-purpose="current-location"></div>
<div class="dest-flag" data-purpose="destination-marker">
<span class="material-symbols-outlined text-4xl">location_on</span>
</div>
</main>
<!-- END: MapBackground -->
<!-- BEGIN: TopNavigationCard -->
<section class="fixed top-0 left-0 w-full p-4 z-20" data-purpose="top-navigation-overlay">
<div class="bg-white rounded-2xl shadow-xl p-4 flex items-center justify-between border border-gray-100">
<div class="flex items-center space-x-4">
<!-- Turn Icon Box -->
<div class="bg-blue-600 rounded-xl p-3 flex items-center justify-center text-white">
<span class="material-symbols-outlined text-3xl font-bold">turn_right</span>
</div>
<!-- Instruction Text -->
<div class="flex flex-col">
<p class="text-gray-900 font-bold text-lg leading-tight">Rẽ phải vào đường Trần Hưng Đạo</p>
<p class="text-blue-600 font-extrabold text-base">trong 200m</p>
</div>
</div>
<!-- Close Action -->
<button aria-label="Đóng" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-50 text-gray-400 hover:text-gray-600">
<span class="material-symbols-outlined">close</span>
</button>
</div>
</section>
<!-- END: TopNavigationCard -->
<!-- BEGIN: BottomInfoPanel -->
<section class="fixed bottom-0 left-0 w-full z-20" data-purpose="bottom-details-panel">
<div class="bg-white rounded-t-[32px] shadow-[0_-8px_30px_rgb(0,0,0,0.12)] p-6 pb-10 border-t border-gray-100">
<!-- Pull handle for UI feel -->
<div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
<!-- Header Destination -->
<div class="flex items-center justify-between mb-6">
<div class="flex items-center space-x-3">
<div class="bg-rose-50 p-2 rounded-lg">
<span class="material-symbols-outlined text-primary">restaurant</span>
</div>
<h2 class="text-xl font-extrabold text-gray-900">Phở Thìn Bờ Hồ</h2>
</div>
<span class="text-sm font-medium text-gray-400">Đang mở cửa</span>
</div>
<!-- Stats Grid -->
<div class="grid grid-cols-3 gap-4 mb-8">
<div class="bg-blue-50/50 rounded-2xl p-3 text-center">
<p class="text-nav-blue font-bold text-lg">12 phút</p>
<p class="text-xs text-gray-500 font-medium">Thời gian</p>
</div>
<div class="bg-gray-50 rounded-2xl p-3 text-center">
<p class="text-gray-800 font-bold text-lg">3.2 km</p>
<p class="text-xs text-gray-500 font-medium">Khoảng cách</p>
</div>
<div class="bg-gray-50 rounded-2xl p-3 text-center">
<p class="text-gray-800 font-bold text-lg">14:42</p>
<p class="text-xs text-gray-500 font-medium">Giờ đến</p>
</div>
</div>
<!-- Transport Mode Selector -->
<div class="flex items-center justify-between gap-3 mb-8">
<button class="flex-1 py-3 px-2 rounded-xl bg-blue-100 text-blue-600 flex items-center justify-center gap-2 border-2 border-blue-200">
<span class="material-symbols-outlined text-xl">directions_car</span>
<span class="text-sm font-bold">Ô tô</span>
</button>
<button class="flex-1 py-3 px-2 rounded-xl bg-gray-50 text-gray-500 flex items-center justify-center gap-2 border-2 border-transparent">
<span class="material-symbols-outlined text-xl">motorcycle</span>
<span class="text-sm font-bold">Xe máy</span>
</button>
<button class="flex-1 py-3 px-2 rounded-xl bg-gray-50 text-gray-500 flex items-center justify-center gap-2 border-2 border-transparent">
<span class="material-symbols-outlined text-xl">directions_walk</span>
<span class="text-sm font-bold">Đi bộ</span>
</button>
</div>
<!-- Primary Action Buttons -->
<div class="flex flex-col gap-3">
<button class="btn-gradient w-full py-4 rounded-2xl text-white font-bold text-lg flex items-center justify-center gap-3 shadow-lg shadow-blue-200 active:scale-[0.98] transition-transform">
<span class="material-symbols-outlined">navigation</span>
          Bắt đầu
        </button>
<button class="w-full py-4 rounded-2xl bg-white text-gray-600 font-bold text-base flex items-center justify-center gap-2 border border-gray-200 active:bg-gray-50">
<span class="material-symbols-outlined text-xl">share</span>
          Chia sẻ
        </button>
</div>
</div>
</section>
<!-- END: BottomInfoPanel -->
</body></html>
