<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Chi tiết ghi chú - MyLoveThaiHoc</title>
<!-- Plus Jakarta Sans Font -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#f43f5e', // rose-500
            background: '#f8f5f6',
            surface: '#ffffff',
          },
          borderRadius: {
            'twelve': '12px',
          },
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
          }
        }
      }
    }
  </script>
<style data-purpose="custom-overrides">
    body {
      background-color: #f8f5f6;
      -webkit-tap-highlight-color: transparent;
    }
    .sentiment-active {
      background-color: #fff1f2; /* rose-50 */
      border: 2px solid #f43f5e;
      transform: scale(1.15);
    }
    .safe-bottom {
      padding-bottom: env(safe-area-inset-bottom);
    }
  </style>
</head>
<body class="font-sans text-slate-900 min-h-screen">
<!-- BEGIN: StickyHeader -->
<header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-rose-100 px-4 py-3 flex items-center justify-between">
<button class="w-10 h-10 flex items-center justify-start text-slate-800" data-purpose="back-button" style="">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
<h1 class="text-lg font-bold" style="">n6 Chi tiết ghi chú</h1>
<button class="text-primary font-semibold text-base px-2" data-purpose="edit-text-button" style="">Sửa</button>
</header>
<!-- END: StickyHeader -->
<main class="p-4 space-y-4">
<!-- BEGIN: HeroCard -->
<section class="bg-surface rounded-twelve p-6 shadow-sm flex flex-col items-center text-center" data-purpose="hero-section">
<div aria-label="Noodle bowl emoji" class="text-[80px] leading-none mb-4" role="img" style="">🍜</div>
<span class="bg-rose-100 text-primary text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider mb-3" style="">Món ăn</span>
<h2 class="text-[22px] font-extrabold text-slate-800 leading-tight" style="">Phở bò là món em yêu nhất</h2>
</section>
<!-- END: HeroCard -->
<!-- BEGIN: SentimentRow -->
<section class="bg-surface rounded-twelve p-4 shadow-sm" data-purpose="sentiment-picker">
<p class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-3 text-center" style="">Cảm xúc liên quan</p>
<div class="flex justify-between items-center px-2">
<button class="sentiment-active w-12 h-12 flex items-center justify-center rounded-twelve transition-all" data-purpose="sentiment-love" style="">
<span class="text-2xl" style="">❤️</span>
</button>
<button class="bg-slate-50 w-12 h-12 flex items-center justify-center rounded-twelve grayscale opacity-50" data-purpose="sentiment-happy" style="">
<span class="text-2xl" style="">😊</span>
</button>
<button class="bg-slate-50 w-12 h-12 flex items-center justify-center rounded-twelve grayscale opacity-50" data-purpose="sentiment-neutral" style="">
<span class="text-2xl" style="">😐</span>
</button>
<button class="bg-slate-50 w-12 h-12 flex items-center justify-center rounded-twelve grayscale opacity-50" data-purpose="sentiment-sad" style="">
<span class="text-2xl" style="">😕</span>
</button>
<button class="bg-slate-50 w-12 h-12 flex items-center justify-center rounded-twelve grayscale opacity-50" data-purpose="sentiment-blocked" style="">
<span class="text-2xl" style="">🚫</span>
</button>
</div>
</section>
<!-- END: SentimentRow -->
<!-- BEGIN: DetailContent -->
<section class="bg-surface rounded-twelve p-5 shadow-sm space-y-2" data-purpose="content-card">
<h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider" style="">Nội dung chi tiết</h3>
<p class="text-slate-700 leading-relaxed text-[15px]" style="">
        Chi tiết món phở — Em thích ăn phở bò tái với nước dùng ngọt, thêm giá, rau thơm và không bỏ hành lá.
      </p>
</section>
<!-- END: DetailContent -->
<!-- BEGIN: InfoMeta -->
<section class="bg-surface rounded-twelve p-5 shadow-sm" data-purpose="info-meta-card">
<h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4" style="">Thông tin</h3>
<div class="space-y-4">
<div class="flex justify-between items-center border-b border-slate-50 pb-3">
<span class="text-slate-500" style="">Danh mục</span>
<span class="font-semibold text-slate-800" style="">Món ăn</span>
</div>
<div class="flex justify-between items-center border-b border-slate-50 pb-3">
<span class="text-slate-500" style="">Cảm xúc</span>
<span class="font-semibold text-slate-800 flex items-center gap-1" style="">Yêu thích <span class="text-sm" style="">❤️</span></span>
</div>
<div class="flex justify-between items-center border-b border-slate-50 pb-3">
<span class="text-slate-500" style="">Ngày tạo</span>
<span class="font-semibold text-slate-800" style="">15/03/2026</span>
</div>
<div class="flex justify-between items-center">
<span class="text-slate-500" style="">Nhắc lại</span>
<span class="font-semibold text-slate-800" style="">Hàng năm</span>
</div>
</div>
</section>
<!-- END: InfoMeta -->
<!-- BEGIN: EventCountdown -->
<!-- END: EventCountdown -->
<!-- BEGIN: Actions -->
<section class="pt-6 pb-12 space-y-3 safe-bottom" data-purpose="action-buttons">
<button class="w-full bg-primary hover:bg-rose-600 text-white font-bold py-4 rounded-twelve shadow-lg shadow-rose-200 transition-all active:scale-[0.98]" style="">
        Chỉnh sửa
      </button>
<button class="w-full bg-transparent border-2 border-slate-200 text-red-500 font-bold py-4 rounded-twelve transition-all active:bg-red-50" style="">
        Xoá ghi chú
      </button>
</section>
<!-- END: Actions -->
</main>
</body></html>
