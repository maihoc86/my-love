<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Thông tin cá nhân - MyLoveThaiHoc</title>
<!-- Tailwind CSS v3 with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Font: Plus Jakarta Sans -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#f43f5e',
            background: '#f8f5f6',
          },
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
          },
          borderRadius: {
            'twelve': '12px',
            '20px': '20px',
          }
        }
      }
    }
  </script>
<style data-purpose="custom-styling">
    body {
      background-color: #f8f5f6;
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    .profile-gradient {
      background: linear-gradient(135deg, #f43f5e 0%, #a855f7 100%);
    }
    .editable-input:focus {
      border-color: #f43f5e;
      ring-color: #f43f5e;
    }
    /* Hide scrollbar for Chrome, Safari and Opera */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    /* Hide scrollbar for IE, Edge and Firefox */
    .no-scrollbar {
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */
    }
  </style>
</head>
<body class="max-w-md mx-auto min-h-screen relative pb-24">
<!-- BEGIN: Sticky Header -->
<header class="sticky top-0 z-50 bg-[#f8f5f6]/80 backdrop-blur-md px-4 py-4 flex items-center justify-between border-b border-rose-100/50">
<button aria-label="Go back" class="p-2 -ml-2 text-slate-800" id="back-btn">
<svg fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="m15 18-6-6 6-6"></path></svg>
</button>
<h1 class="text-lg font-bold text-slate-900">Thông tin cá nhân</h1>
<button class="text-primary font-semibold text-base" data-purpose="toggle-edit-mode" id="edit-toggle-btn">
      Chỉnh sửa
    </button>
</header>
<!-- END: Sticky Header -->
<main class="px-5 pt-4 space-y-6">
<!-- BEGIN: Profile Hero Card -->
<section class="profile-gradient rounded-20px p-8 flex flex-col items-center justify-center text-center shadow-lg shadow-rose-200/50">
<div class="relative mb-4">
<div class="w-20 h-20 rounded-full border-4 border-white/30 overflow-hidden bg-white shadow-inner">
<img alt="Avatar" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDCiYfT8iaYgwZnjwsqz6r73l9JDOhACrM55sGU9nmAoNs6kZO0xnjIBviIgl9_n5aiPS3oisa4Kc8GrmULU3RNPnHmc46c6QjT-Bk05UggT8_Ybq-N_Pa3-pFrs8zfrsN0N3zom5VwCo6BllXIlB2n8pPRG09lTjiwkyBK4qHRpsdO_XxyI64qx9Q-3he84KaixrQOsQNLw3o4jOkfEDtS2bxZ47iVc0AXv-ClyOZjSFfvEFODPkrpzCpNs0ccfGlONqJf_E39NRhh"/>
</div>
<button class="hidden absolute bottom-0 right-0 bg-white p-1.5 rounded-full shadow-md text-primary" data-purpose="change-photo" id="edit-avatar-btn">
<svg fill="none" height="16" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="16" xmlns="http://www.w3.org/2000/svg"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
</button>
</div>
<h2 class="text-white text-xl font-bold tracking-tight" id="display-name">Nguyễn Văn A</h2>
<p class="text-white/80 text-sm font-medium mt-1" id="display-email">nguyenvana@gmail.com</p>
</section>
<!-- END: Profile Hero Card -->
<!-- BEGIN: Information Form -->
<section class="bg-white rounded-20px p-6 shadow-sm border border-rose-50 space-y-5" data-purpose="personal-info-container">
<!-- Full Name -->
<div class="space-y-1.5">
<label class="text-xs font-semibold uppercase tracking-wider text-slate-400 ml-1" for="input-fullname">Họ và tên</label>
<input class="w-full px-4 py-3 rounded-xl border-slate-100 bg-slate-50/50 text-slate-800 font-medium transition-all duration-200 focus:ring-primary focus:border-primary disabled:opacity-70 read-only:border-transparent read-only:bg-transparent read-only:px-1" id="input-fullname" readonly="" type="text" value="Nguyễn Văn A"/>
</div>
<!-- Email -->
<div class="space-y-1.5">
<label class="text-xs font-semibold uppercase tracking-wider text-slate-400 ml-1" for="input-email">Email</label>
<input class="w-full px-4 py-3 rounded-xl border-slate-100 bg-slate-50/50 text-slate-800 font-medium transition-all duration-200 focus:ring-primary focus:border-primary read-only:border-transparent read-only:bg-transparent read-only:px-1" id="input-email" readonly="" type="email" value="nguyenvana@gmail.com"/>
</div>
<!-- Phone -->
<div class="space-y-1.5">
<label class="text-xs font-semibold uppercase tracking-wider text-slate-400 ml-1" for="input-phone">Số điện thoại</label>
<input class="w-full px-4 py-3 rounded-xl border-slate-100 bg-slate-50/50 text-slate-800 font-medium transition-all duration-200 focus:ring-primary focus:border-primary read-only:border-transparent read-only:bg-transparent read-only:px-1" id="input-phone" readonly="" type="tel" value="0912 345 678"/>
</div>
<!-- Join Date -->
<div class="space-y-1.5">
<label class="text-xs font-semibold uppercase tracking-wider text-slate-400 ml-1">Ngày tham gia</label>
<div class="px-1 py-3 text-slate-500 font-medium cursor-default">15/03/2025</div>
</div>
</section>
<!-- END: Information Form -->
</main>
<!-- BEGIN: Bottom Action Button -->
<div class="fixed bottom-0 left-0 right-0 p-5 bg-white/80 backdrop-blur-md transform translate-y-full transition-transform duration-300 ease-in-out border-t border-rose-50 max-w-md mx-auto" id="save-button-container">
<button class="w-full bg-primary hover:bg-rose-600 text-white font-bold py-4 rounded-20px shadow-lg shadow-rose-200 transition-all active:scale-95" id="save-btn">
      Lưu thay đổi
    </button>
</div>
<!-- END: Bottom Action Button -->
<script data-purpose="interface-logic">
    const editBtn = document.getElementById('edit-toggle-btn');
    const saveContainer = document.getElementById('save-button-container');
    const saveBtn = document.getElementById('save-btn');
    const editAvatarBtn = document.getElementById('edit-avatar-btn');
    const inputs = [
      document.getElementById('input-fullname'),
      document.getElementById('input-email'),
      document.getElementById('input-phone')
    ];

    let isEditMode = false;

    function toggleEditMode() {
      isEditMode = !isEditMode;

      if (isEditMode) {
        // Switch to Edit State
        editBtn.textContent = 'Hủy';
        editBtn.classList.remove('text-primary');
        editBtn.classList.add('text-slate-500');
        
        saveContainer.classList.remove('translate-y-full');
        editAvatarBtn.classList.remove('hidden');

        inputs.forEach(input => {
          input.readOnly = false;
          input.classList.remove('read-only:border-transparent', 'read-only:bg-transparent', 'read-only:px-1');
          input.classList.add('border', 'bg-slate-50/50');
        });
        
        // Focus first input
        inputs[0].focus();
      } else {
        // Switch to Readonly State
        editBtn.textContent = 'Chỉnh sửa';
        editBtn.classList.add('text-primary');
        editBtn.classList.remove('text-slate-500');
        
        saveContainer.classList.add('translate-y-full');
        editAvatarBtn.classList.add('hidden');

        inputs.forEach(input => {
          input.readOnly = true;
          input.classList.add('read-only:border-transparent', 'read-only:bg-transparent', 'read-only:px-1');
          input.classList.remove('border', 'bg-slate-50/50');
        });
      }
    }

    editBtn.addEventListener('click', toggleEditMode);

    saveBtn.addEventListener('click', () => {
      // Logic for saving data
      const name = document.getElementById('input-fullname').value;
      const email = document.getElementById('input-email').value;
      
      // Update UI displays
      document.getElementById('display-name').textContent = name;
      document.getElementById('display-email').textContent = email;

      // Exit edit mode
      toggleEditMode();
      
      // Feedback (optional simple alert for demo)
      console.log('Thông tin đã được cập nhật!');
    });
  </script>
</body></html>
