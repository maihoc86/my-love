<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MyLoveThaiHoc Login</title>
<!-- Google Font: Plus Jakarta Sans -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols Outlined -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
<!-- Tailwind CSS v3 -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#f43e5c',
            background: '#f8f5f6',
          },
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
          },
        }
      }
    }
  </script>
<style data-purpose="custom-animations">
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }
    .floating { animation: float 4s ease-in-out infinite; }
    .floating-delayed { animation: float 5s ease-in-out infinite 1s; }
  </style>
</head>
<body class="bg-background font-sans text-slate-800 min-h-screen">
<!-- BEGIN: HeroSection -->
<section class="relative h-[40vh] bg-gradient-to-br from-rose-500 via-pink-500 to-purple-600 flex flex-col items-center justify-center text-white overflow-hidden" data-purpose="top-branding">
<!-- Decorative Floating Circles -->
<div class="absolute top-10 -left-10 w-32 h-32 bg-white/10 rounded-full floating"></div>
<div class="absolute top-20 -right-5 w-20 h-20 bg-white/10 rounded-full floating-delayed"></div>
<div class="absolute bottom-20 left-1/4 w-12 h-12 bg-white/5 rounded-full floating"></div>
<div class="z-10 flex flex-col items-center text-center px-6">
<!-- Heart Icon -->
<div class="mb-4">
<span class="material-symbols-outlined !text-[64px]" style="font-variation-settings: 'FILL' 1">
          favorite
        </span>
</div>
<!-- App Identity -->
<h1 class="text-3xl font-extrabold tracking-tight mb-1">MyLoveThaiHoc</h1>
<p class="text-white/80 font-medium">Ghi nhớ mọi điều về em</p>
</div>
</section>
<!-- END: HeroSection -->
<!-- BEGIN: LoginFormSection -->
<main class="relative px-6 -mt-8 pb-12" data-purpose="login-container">
<div class="bg-white rounded-[2rem] shadow-xl p-8" data-purpose="login-card">
<!-- Card Header -->
<div class="mb-8">
<h2 class="text-2xl font-bold text-slate-900">Đăng nhập</h2>
<p class="text-slate-500 text-sm">Chào mừng bạn quay lại</p>
</div>
<!-- Form Fields -->
<form action="#" class="space-y-5" method="POST">
<!-- Phone/Email Input -->
<div class="space-y-1.5">
<label class="text-xs font-semibold text-slate-500 ml-1 uppercase" for="identity">Số điện thoại / Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">
              phone
            </span>
<input class="w-full pl-12 pr-4 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl focus:bg-white focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none text-slate-900 placeholder:text-slate-400" id="identity" placeholder="0912 345 678" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-1.5">
<label class="text-xs font-semibold text-slate-500 ml-1 uppercase" for="password">Mật khẩu</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">
              lock
            </span>
<input class="w-full pl-12 pr-12 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl focus:bg-white focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none text-slate-900 placeholder:text-slate-400" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Forgot Password Link -->
<div class="text-right">
<a class="text-primary text-sm font-semibold hover:underline" href="#">Quên mật khẩu?</a>
</div>
<!-- Primary Login Button -->
<button class="w-full py-4 bg-gradient-to-r from-primary to-pink-500 text-white font-bold rounded-2xl shadow-lg shadow-primary/30 active:scale-[0.98] transition-transform" type="submit">
          Đăng nhập
        </button>
</form>
<!-- Divider -->
<div class="flex items-center my-8 text-slate-400 text-xs font-medium uppercase tracking-widest">
<div class="flex-grow h-px bg-slate-100"></div>
<span class="px-4">hoặc</span>
<div class="flex-grow h-px bg-slate-100"></div>
</div>
<!-- Secondary Login Methods -->
<div class="space-y-4">
<!-- OTP Login -->
<button class="w-full py-3.5 border-2 border-primary text-primary font-bold rounded-2xl flex items-center justify-center gap-2 active:bg-primary/5 transition-colors">
<span class="material-symbols-outlined text-[20px]">sms</span>
          Đăng nhập bằng mã OTP
        </button>
<!-- Google Login -->
<button class="w-full py-3.5 border border-slate-200 text-slate-700 font-bold rounded-2xl flex items-center justify-center gap-3 hover:bg-slate-50 transition-colors">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
          Tiếp tục với Google
        </button>
</div>
<!-- Register Link -->
<div class="mt-8 text-center">
<p class="text-slate-600 text-sm">
          Chưa có tài khoản? 
          <a class="text-primary font-bold hover:underline ml-1" href="#">Đăng ký</a>
</p>
</div>
</div>
</main>
<!-- END: LoginFormSection -->
</body></html>
