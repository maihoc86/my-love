<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Đăng ký - MyLoveThaiHoc</title>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Plus Jakarta Sans -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols Outlined -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#f43e5c',
            background: '#f8f5f6',
          },
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
          },
        }
      }
    }
  </script>
<style data-purpose="custom-layout">
    body {
      background-color: #f8f5f6;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    /* Custom ring color for inputs */
    .input-focus:focus {
      border-color: #f43e5c;
      box-shadow: 0 0 0 2px rgba(244, 62, 92, 0.2);
    }
  </style>
</head>
<body class="antialiased font-sans">
<!-- BEGIN: MainContainer -->
<div class="min-h-screen flex flex-col max-w-md mx-auto relative">
<!-- BEGIN: HeaderSection -->
<header class="relative h-[25vh] bg-gradient-to-br from-rose-500 to-purple-600 flex flex-col justify-center px-6 overflow-hidden" data-purpose="app-header">
<!-- Decorative Background Elements -->
<div class="absolute -top-10 -right-10 w-32 h-32 bg-white/10 rounded-full"></div>
<div class="absolute top-20 -left-5 w-20 h-20 bg-white/5 rounded-full"></div>
<!-- Back Button -->
<div class="absolute top-6 left-6">
<button class="bg-white/20 backdrop-blur-sm p-2 rounded-full text-white flex items-center justify-center transition hover:bg-white/30">
<span class="material-symbols-outlined">arrow_back</span>
</button>
</div>
<div class="flex flex-col items-center mt-4">
<div class="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center backdrop-blur-md mb-3">
<span class="material-symbols-outlined text-white text-[48px]">favorite</span>
</div>
<h1 class="text-white text-2xl font-bold">Tạo tài khoản</h1>
</div>
</header>
<!-- END: HeaderSection -->
<!-- BEGIN: FormCardSection -->
<main class="flex-grow bg-white rounded-t-[32px] -mt-6 relative z-10 px-6 pt-8 pb-10 shadow-xl" data-purpose="registration-form">
<div class="mb-8">
<h2 class="text-2xl font-bold text-slate-900">Đăng ký</h2>
<p class="text-sm text-slate-500 mt-1">Bắt đầu ghi nhớ mọi điều về em</p>
</div>
<form class="space-y-4">
<!-- Full Name Input -->
<!-- Phone Number Input -->
<div class="space-y-1">
<label class="text-sm font-semibold text-slate-700 ml-1">Số điện thoại</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">phone</span>
<input class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none input-focus text-slate-900 transition-all" placeholder="0xxx xxx xxx" type="tel"/>
</div>
</div>
<!-- Email Input -->
<div class="space-y-1">
<label class="text-sm font-semibold text-slate-700 ml-1">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">email</span>
<input class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none input-focus text-slate-900 transition-all" placeholder="example@mail.com" type="email"/>
</div>
</div><button class="w-full py-3 bg-rose-100 text-primary font-bold rounded-xl hover:bg-rose-200 transition-colors mt-2" type="button">Gửi mã OTP</button><div class="space-y-4 mt-6">
<label class="text-sm font-semibold text-slate-700 ml-1">Nhập mã xác thực (OTP)</label>
<div class="flex justify-between gap-2">
<input class="w-12 h-12 text-center text-xl font-bold bg-slate-50 border border-slate-200 rounded-xl focus:ring-primary focus:border-primary" maxlength="1" type="text"/>
<input class="w-12 h-12 text-center text-xl font-bold bg-slate-50 border border-slate-200 rounded-xl focus:ring-primary focus:border-primary" maxlength="1" type="text"/>
<input class="w-12 h-12 text-center text-xl font-bold bg-slate-50 border border-slate-200 rounded-xl focus:ring-primary focus:border-primary" maxlength="1" type="text"/>
<input class="w-12 h-12 text-center text-xl font-bold bg-slate-50 border border-slate-200 rounded-xl focus:ring-primary focus:border-primary" maxlength="1" type="text"/>
<input class="w-12 h-12 text-center text-xl font-bold bg-slate-50 border border-slate-200 rounded-xl focus:ring-primary focus:border-primary" maxlength="1" type="text"/>
<input class="w-12 h-12 text-center text-xl font-bold bg-slate-50 border border-slate-200 rounded-xl focus:ring-primary focus:border-primary" maxlength="1" type="text"/>
</div>
<div class="flex justify-center items-center gap-2 text-sm text-slate-500">
<span>Chưa nhận được mã?</span>
<button class="text-primary font-semibold" type="button">Gửi lại mã</button>
<span class="text-slate-400 font-medium">(01:59)</span>
</div>
</div>
<!-- Password Input -->
<!-- Confirm Password Input -->
<div class="space-y-1">
<label class="text-sm font-semibold text-slate-700 ml-1">Xác nhận mật khẩu</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">lock</span>
<input class="w-full pl-10 pr-10 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none input-focus text-slate-900 transition-all" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 cursor-pointer">visibility_off</span>
</div>
</div>
<!-- Terms and Conditions -->
<!-- Submit Button -->
<button class="w-full py-4 bg-gradient-to-r from-primary to-pink-500 text-white font-bold rounded-2xl shadow-lg shadow-rose-200 active:scale-[0.98] transition-all mt-4" type="submit">Xác nhận và Đăng ký</button>
</form>
<!-- Divider -->
<div class="flex items-center my-8 text-slate-400 text-sm">
<div class="flex-grow border-t border-slate-100"></div>
<span class="px-4">hoặc</span>
<div class="flex-grow border-t border-slate-100"></div>
</div>
<!-- Social Button -->
<button class="w-full flex items-center justify-center gap-3 py-3.5 border border-slate-200 rounded-2xl bg-white text-slate-700 font-semibold hover:bg-slate-50 transition-colors mb-8">
<img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAxKs0e2z3ZNxgzwai0Puu2vjmF9PR2YQsvPdLEgc6XsaBuoKmaMuJJYTKG4ItDAnWnh4PXuXt85pcyO6QbRmw9n_U9UE-joRhQTpSN-0_Ihu1t71XyjBSSZdoZA6HZVZYPuRYuXAwxhqZYltsn5JjpZqGKJi1pyllywo99aFqTS04lXoyj0TfKBUZFvfQraxl8dxrmyhOjTyclteY7HcIRC7DzXdW9nT5zyKzjwbVnrPOUb3GtIRvhO4tes1ugjjtwueX1qyXe-3e5"/>
        Đăng ký với Google
      </button>
<!-- Footer -->
<div class="text-center">
<p class="text-slate-600 text-sm">
          Đã có tài khoản? 
          <a class="text-primary font-bold ml-1" href="#">Đăng nhập</a>
</p>
</div>
</main>
<!-- END: FormCardSection -->
</div>
<!-- END: MainContainer -->
</body></html>
