# ============================================================
# E2E: Auth - Forgot Password Screen
# Route: /(auth)/forgot-password
# Tags: auth
# ============================================================
appId: com.cds.mylovethaihoc
tags:
  - auth
---

- launchApp:
    clearState: true

# Navigate to forgot password from login
- assertVisible: "Đăng nhập"
- tapOn:
    text: "Quên mật khẩu"
    optional: true

# Verify forgot password screen (3-step flow)
- assertVisible:
    text: "Quên mật khẩu"
    optional: true

# Step 1: Enter phone
- tapOn:
    text: "Số điện thoại"
    optional: true
- inputText: ${TEST_PHONE}
- tapOn:
    text: "Gửi mã"
    optional: true

# Step 2: Enter OTP
- assertVisible:
    text: ".*[Mm]ã xác nhận.*"
    optional: true
- inputText:
    text: ${TEST_OTP}
    optional: true

# Step 3: New password
- assertVisible:
    text: ".*[Mm]ật khẩu mới.*"
    optional: true

# Screenshot
- takeScreenshot: auth_forgot_password
